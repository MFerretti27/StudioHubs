name: Release On Main

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Compute next StudioHubs tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag=$(git tag --list 'StudioHubs_v*' --sort=-v:refname | head -n1 || true)

          if [[ -z "${latest_tag}" ]]; then
            next_version="1.0.0"
          else
            raw_version="${latest_tag#StudioHubs_v}"
            IFS='.' read -r major minor patch <<< "${raw_version}"
            major=${major:-1}
            minor=${minor:-0}
            patch=${patch:-0}
            next_version="${major}.${minor}.$((patch + 1))"
          fi

          tag_name="StudioHubs_v${next_version}"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Prepare manifest and meta for release version
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag_name }}/${{ steps.version.outputs.tag_name }}.zip
          RELEASE_TS: ${{ github.event.pull_request.merged_at }}
        shell: bash
        run: |
          set -euo pipefail

          release_timestamp="${RELEASE_TS}"
          if [[ -z "${release_timestamp// }" ]]; then
            release_timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi

          manifest_target_abi="$(jq -r '.[0].versions[0].targetAbi // "10.11.0.0"' manifest.json)"
          manifest_changelog="$(jq -r '.[0].versions[0].changelog // "Automated release"' manifest.json)"

          jq \
            --arg version "$NEXT_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$manifest_target_abi" \
            --arg changelog "$manifest_changelog" \
            '.[0].versions = ([{version: $version, changelog: $changelog, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.[0].versions // [] | map(select(.version != $version))))' \
            manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

          meta_target_abi="$(jq -r '.versions[0].targetAbi // "10.11.0.0"' meta.json)"

          jq \
            --arg version "$NEXT_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$meta_target_abi" \
            '.versions = ([{version: $version, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.versions // [] | map(select(.version != $version))))' \
            meta.json > meta.json.tmp
          mv meta.json.tmp meta.json

      - name: Build publish output
        run: dotnet publish -c Release

      - name: Create release zip package
        id: package
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          zip_name="${TAG_NAME}.zip"
          zip -j "$zip_name" \
            bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.dll \
            bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.deps.json \
            bin/Release/net9.0/publish/manifest.json \
            bin/Release/net9.0/publish/meta.json

          echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"

      - name: Compute release zip checksum
        id: checksum
        env:
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
        shell: bash
        run: |
          set -euo pipefail
          zip_checksum="$(sha256sum "$ZIP_NAME" | awk '{print $1}')"
          echo "zip_checksum=${zip_checksum}" >> "$GITHUB_OUTPUT"

      - name: Finalize manifest and meta checksum
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag_name }}/${{ steps.version.outputs.tag_name }}.zip
          RELEASE_TS: ${{ github.event.pull_request.merged_at }}
          ZIP_CHECKSUM: ${{ steps.checksum.outputs.zip_checksum }}
        shell: bash
        run: |
          set -euo pipefail

          release_timestamp="${RELEASE_TS}"
          if [[ -z "${release_timestamp// }" ]]; then
            release_timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi

          manifest_target_abi="$(jq -r '.[0].versions[0].targetAbi // "10.11.0.0"' manifest.json)"
          manifest_changelog="$(jq -r '.[0].versions[0].changelog // "Automated release"' manifest.json)"

          jq \
            --arg version "$NEXT_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "$ZIP_CHECKSUM" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$manifest_target_abi" \
            --arg changelog "$manifest_changelog" \
            '.[0].versions = ([{version: $version, changelog: $changelog, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.[0].versions // [] | map(select(.version != $version))))' \
            manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

          meta_target_abi="$(jq -r '.versions[0].targetAbi // "10.11.0.0"' meta.json)"

          jq \
            --arg version "$NEXT_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "$ZIP_CHECKSUM" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$meta_target_abi" \
            '.versions = ([{version: $version, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.versions // [] | map(select(.version != $version))))' \
            meta.json > meta.json.tmp
          mv meta.json.tmp meta.json

      - name: Commit manifest updates
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          PUSH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add manifest.json meta.json
          if git diff --cached --quiet; then
            echo "No manifest/meta changes to commit."
          else
            git commit -m "chore(release): update metadata for ${TAG_NAME} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create and push tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          PUSH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME"
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Resolve release notes from merged PR
        id: pr_notes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          pr_body="${PR_BODY//$'\r'/}"
          release_body="$(
            printf '%s\n' "${pr_body}" |
            awk '
              BEGIN { in_notes = 0 }
              /^##[[:space:]]+Release Notes[[:space:]]*$/ { in_notes = 1; next }
              /^##[[:space:]]+/ { if (in_notes) exit }
              { if (in_notes) print }
            ' |
            sed '/^[[:space:]]*<!--/,/-->[[:space:]]*$/d'
          )"

          # Trim leading/trailing blank lines.
          release_body="$(printf '%s\n' "${release_body}" | sed '/./,$!d' | tac | sed '/./,$!d' | tac)"

          # Treat template placeholder as empty.
          if [[ "${release_body}" == "-" ]] || [[ -z "${release_body//[[:space:]]/}" ]]; then
            release_body="Release from merged PR #${PR_NUMBER}: ${PR_TITLE}"
          fi

          {
            echo "release_body<<EOF"
            echo "${release_body}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          body: ${{ steps.pr_notes.outputs.release_body }}
          generate_release_notes: false
          files: ${{ steps.package.outputs.zip_name }}
