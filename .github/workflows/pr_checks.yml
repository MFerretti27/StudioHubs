name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

  package-smoke:
    name: Publish And Package Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish
        run: dotnet publish -c Release

      - name: Verify required publish files exist
        shell: bash
        run: |
          set -euo pipefail
          test -f bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.dll
          test -f bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.deps.json
          test -f bin/Release/net9.0/publish/manifest.json
          test -f bin/Release/net9.0/publish/meta.json

      - name: Create package zip (smoke)
        shell: bash
        run: |
          set -euo pipefail
          zip -j StudioHubs-PR-smoke.zip \
            bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.dll \
            bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.deps.json \
            bin/Release/net9.0/publish/manifest.json \
            bin/Release/net9.0/publish/meta.json

      - name: Verify zip contents
        run: unzip -l StudioHubs-PR-smoke.zip

  metadata-validate:
    name: Validate Plugin Metadata JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest.json and meta.json syntax
        run: |
          jq . manifest.json > /dev/null
          jq . meta.json > /dev/null

      - name: Validate required metadata fields
        shell: bash
        run: |
          set -euo pipefail

          jq -e 'type == "array" and length > 0' manifest.json > /dev/null
          jq -e '.[0].guid and .[0].name and .[0].versions and (.[0].versions | length > 0)' manifest.json > /dev/null
          jq -e '.[0].versions[0].version and .[0].versions[0].targetAbi' manifest.json > /dev/null

          jq -e '.guid and .name and .versions and (.versions | length > 0)' meta.json > /dev/null
          jq -e '.versions[0].version and .versions[0].targetAbi' meta.json > /dev/null
