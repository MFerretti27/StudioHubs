name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version override (format: X.Y.Z.W)"
        required: false
        default: ""
      release_notes:
        description: Optional release notes body (markdown)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Compute next release tag
        id: version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          latest_tag=$(
            git tag --list --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n1 || true
          )

          latest_version=""
          if [[ -n "${latest_tag}" ]]; then
            latest_version="${latest_tag#v}"
          fi

          requested_version="${REQUESTED_VERSION:-}"
          requested_version="${requested_version//[[:space:]]/}"

          if [[ -n "${requested_version}" ]]; then
            requested_version="${requested_version#v}"

            if [[ ! "${requested_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version input '${REQUESTED_VERSION}'. Use X.Y.Z.W (for example 1.0.1.0)."
              exit 1
            fi

            if [[ -n "${latest_version}" ]]; then
              highest=$(printf '%s\n%s\n' "${latest_version}" "${requested_version}" | sort -V | tail -n1)
              if [[ "${requested_version}" == "${latest_version}" || "${highest}" != "${requested_version}" ]]; then
                echo "Requested version ${requested_version} must be greater than latest tag version ${latest_version}."
                exit 1
              fi
            fi

            next_version="${requested_version}"
          elif [[ -z "${latest_version}" ]]; then
            next_version="1.0.0.0"
          else
            IFS='.' read -r major minor patch revision <<< "${latest_version}"
            major=${major:-1}
            minor=${minor:-0}
            patch=${patch:-0}
            next_version="${major}.${minor}.$((patch + 1)).0"
          fi

          tag_name="v${next_version}"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Prepare manifest and meta for release version
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          PLUGIN_VERSION: ${{ steps.version.outputs.next_version }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag_name }}/${{ steps.version.outputs.tag_name }}.zip
          RELEASE_TS: ${{ github.event.repository.updated_at }}
        shell: bash
        run: |
          set -euo pipefail

          release_timestamp="${RELEASE_TS}"
          if [[ -z "${release_timestamp// }" ]]; then
            release_timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi

          manifest_target_abi="$(jq -r '.[0].versions[0].targetAbi // "10.11.0.0"' manifest.json)"
          manifest_changelog="$(jq -r '.[0].versions[0].changelog // "Automated release"' manifest.json)"

          jq \
            --arg version "$PLUGIN_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$manifest_target_abi" \
            --arg changelog "$manifest_changelog" \
            '.[0].versions = ([{version: $version, changelog: $changelog, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.[0].versions // [] | map(select(.version != $version))))' \
            manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

          meta_target_abi="$(jq -r '.versions[0].targetAbi // "10.11.0.0"' meta.json)"

          jq \
            --arg version "$PLUGIN_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$meta_target_abi" \
            '.versions = ([{version: $version, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.versions // [] | map(select(.version != $version))))' \
            meta.json > meta.json.tmp
          mv meta.json.tmp meta.json

      - name: Sync project version
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.next_version }}
        shell: bash
        run: |
          set -euo pipefail

          perl -0777 -i -pe 's|<Version>[^<]+</Version>|<Version>'"${PLUGIN_VERSION}"'</Version>|' StudioHubsPlugin.csproj

      - name: Build publish output
        run: dotnet publish -c Release

      - name: Create release zip package
        id: package
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          zip_name="${TAG_NAME}.zip"
          zip -j "$zip_name" \
            bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.dll \
            bin/Release/net9.0/publish/Jellyfin.Plugin.StudioHubs.deps.json \
            bin/Release/net9.0/publish/manifest.json \
            bin/Release/net9.0/publish/meta.json \
            bin/Release/net9.0/publish/StudioHubs.png

          echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"

      - name: Compute release zip checksum (md5)
        id: checksum
        env:
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
        shell: bash
        run: |
          set -euo pipefail
          zip_checksum="$(md5sum "$ZIP_NAME" | awk '{print $1}')"
          echo "zip_checksum=${zip_checksum}" >> "$GITHUB_OUTPUT"

      - name: Finalize manifest and meta checksum
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          PLUGIN_VERSION: ${{ steps.version.outputs.next_version }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag_name }}/${{ steps.version.outputs.tag_name }}.zip
          RELEASE_TS: ${{ github.event.repository.updated_at }}
          ZIP_CHECKSUM: ${{ steps.checksum.outputs.zip_checksum }}
        shell: bash
        run: |
          set -euo pipefail

          release_timestamp="${RELEASE_TS}"
          if [[ -z "${release_timestamp// }" ]]; then
            release_timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi

          manifest_target_abi="$(jq -r '.[0].versions[0].targetAbi // "10.11.0.0"' manifest.json)"
          manifest_changelog="$(jq -r '.[0].versions[0].changelog // "Automated release"' manifest.json)"

          jq \
            --arg version "$PLUGIN_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "$ZIP_CHECKSUM" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$manifest_target_abi" \
            --arg changelog "$manifest_changelog" \
            '.[0].versions = ([{version: $version, changelog: $changelog, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.[0].versions // [] | map(select(.version != $version))))' \
            manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

          meta_target_abi="$(jq -r '.versions[0].targetAbi // "10.11.0.0"' meta.json)"

          jq \
            --arg version "$PLUGIN_VERSION" \
            --arg sourceUrl "$RELEASE_URL" \
            --arg checksum "$ZIP_CHECKSUM" \
            --arg timestamp "$release_timestamp" \
            --arg targetAbi "$meta_target_abi" \
            '.versions = ([{version: $version, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}] + (.versions // [] | map(select(.version != $version))))' \
            meta.json > meta.json.tmp
          mv meta.json.tmp meta.json

      - name: Commit manifest updates
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          PUSH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add manifest.json meta.json StudioHubsPlugin.csproj
          if git diff --cached --quiet; then
            echo "No metadata/project-version changes to commit."
          else
            git commit -m "chore(release): update metadata and version for ${TAG_NAME} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create and push tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          PUSH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME"
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Resolve release notes
        id: release_notes
        env:
          INPUT_NOTES: ${{ github.event.inputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail

          release_body="${INPUT_NOTES//$'\r'/}"
          if [[ -z "${release_body//[[:space:]]/}" ]]; then
            release_body="Manual release triggered by @${GITHUB_ACTOR}."
          fi

          {
            echo "release_body<<EOF"
            echo "${release_body}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          body: ${{ steps.release_notes.outputs.release_body }}
          generate_release_notes: false
          files: ${{ steps.package.outputs.zip_name }}
