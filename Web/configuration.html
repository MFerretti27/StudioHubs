<div id="StudioHubsConfigPage"
     data-role="page"
     class="page type-interior pluginConfigurationPage"
     translate="no"
     data-jf-no-translate="1">

  <div class="content-primary">
    <div class="studiohubs-card">
      <h2>Studio Hubs</h2>
      <p class="studiohubs-muted">Configure the home row, hover behavior, and default placement.</p>

      <form id="cfgForm" class="studiohubs-form" onsubmit="return false;">
        <label class="studiohubs-checkline">
          <input id="studioHubsHoverVideo" type="checkbox" />
          <span>Enable hover video</span>
        </label>

        <label class="studiohubs-checkline">
          <input id="studioHubsRandomOrder" type="checkbox" />
          <span>Randomize studio order on each Home visit</span>
        </label>

        <div class="inputContainer">
          <label class="inputLabel" for="studioHubsPlaceAfter">Place after sections</label>
          <input id="studioHubsPlaceAfter" type="text" class="emby-input" placeholder="continue watching" />
          <div class="fieldDescription">Comma-separated section title fragments.</div>
        </div>

        <div class="inputContainer">
          <label class="inputLabel" for="studioHubsPlaceBefore">Place before sections</label>
          <input id="studioHubsPlaceBefore" type="text" class="emby-input" placeholder="recently added,latest,recent" />
          <div class="fieldDescription">Comma-separated section title fragments.</div>
        </div>

        <div class="buttonContainer">
          <button id="saveBtn" type="button" class="raised button-submit">Save</button>
        </div>
      </form>

      <div id="status" class="fieldDescription studiohubs-status"></div>
    </div>

    <div class="studiohubs-card" style="margin-top: 24px;">
      <h2>Studio Management</h2>
      <p class="studiohubs-muted">Configure studios for all users. These settings apply globally.</p>

      <div id="studiosList" class="studiohubs-studios-list"></div>

      <div class="buttonContainer" style="margin-top: 16px;">
        <button id="saveStudiosBtn" type="button" class="raised button-submit">Save Studio Order</button>
      </div>

      <div id="studiosStatus" class="fieldDescription studiohubs-status"></div>
    </div>
  </div>

  <style>
    #StudioHubsConfigPage .studiohubs-studios-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid rgba(127, 140, 141, 0.24);
      border-radius: 8px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.1);
    }

    #StudioHubsConfigPage .studiohubs-studio-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--cardBackgroundColor);
      border-radius: 6px;
      border: 1px solid rgba(127, 140, 141, 0.16);
      cursor: move;
      user-select: none;
    }

    #StudioHubsConfigPage .studiohubs-studio-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    #StudioHubsConfigPage .studiohubs-studio-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }

    #StudioHubsConfigPage .studiohubs-studio-item-name {
      flex: 1;
      font-size: 0.95em;
    }

    #StudioHubsConfigPage .studiohubs-studio-item-handle {
      flex-shrink: 0;
      cursor: grab;
      color: var(--labelTextColor);
      font-size: 0.9em;
    }

    #StudioHubsConfigPage .studiohubs-studio-item-handle:active {
      cursor: grabbing;
    }

    #StudioHubsConfigPage .studiohubs-studio-item.dragging {
      opacity: 0.5;
      background: rgba(100, 150, 200, 0.1);
    }

    #StudioHubsConfigPage .studiohubs-card {
      background: var(--cardBackgroundColor);
      border: 1px solid rgba(127, 140, 141, 0.24);
      border-radius: 18px;
      box-shadow: 0 18px 36px rgba(7, 14, 24, 0.14);
      padding: 24px;
    }

    #StudioHubsConfigPage h2 {
      margin: 0 0 8px;
    }

    #StudioHubsConfigPage .studiohubs-muted {
      margin: 0 0 18px;
      color: var(--labelTextColor);
    }

    #StudioHubsConfigPage .studiohubs-form {
      display: grid;
      gap: 14px;
    }

    #StudioHubsConfigPage .studiohubs-checkline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      cursor: pointer;
      user-select: none;
    }

    #StudioHubsConfigPage .studiohubs-checkline input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    #StudioHubsConfigPage .studiohubs-status {
      min-height: 24px;
      margin-top: 12px;
    }

    #StudioHubsConfigPage .studiohubs-status.ok {
      color: #2f9b5c;
    }

    #StudioHubsConfigPage .studiohubs-status.err {
      color: #d64550;
    }

    #StudioHubsConfigPage #saveBtn {
      font-size: calc(1em + 2px);
    }
  </style>

  <script>
    (() => {
      const page = document.getElementById("StudioHubsConfigPage");
      if (!page) return;

      const statusEl = page.querySelector("#status");
      const saveBtn = page.querySelector("#saveBtn");

      function token() {
        try { return window.ApiClient?.accessToken?.() || window.ApiClient?._accessToken || ""; } catch { return ""; }
      }

      async function userId() {
        try {
          const user = await window.ApiClient?.getCurrentUser?.();
          return user?.Id || "";
        } catch {
          return "";
        }
      }

      async function headers(withJson = false) {
        const headerBag = { Accept: "application/json" };
        const accessToken = token();
        const currentUserId = await userId();
        if (accessToken) headerBag["X-Emby-Token"] = accessToken;
        if (currentUserId) headerBag["X-Emby-UserId"] = currentUserId;
        if (withJson) headerBag["Content-Type"] = "application/json";
        return headerBag;
      }

      function setStatus(message, ok) {
        statusEl.textContent = message || "";
        statusEl.className = "fieldDescription studiohubs-status" + (ok == null ? "" : ok ? " ok" : " err");
      }

      function input(id) {
        return page.querySelector("#" + id);
      }

      function getCfgValue(cfg, camelKey, pascalKey, fallback) {
        if (cfg && Object.prototype.hasOwnProperty.call(cfg, camelKey)) return cfg[camelKey];
        if (cfg && Object.prototype.hasOwnProperty.call(cfg, pascalKey)) return cfg[pascalKey];
        return fallback;
      }

      function applyConfig(cfg) {
        const hoverVideo = getCfgValue(cfg, "studioHubsHoverVideo", "StudioHubsHoverVideo", true);
        const randomOrder = getCfgValue(cfg, "studioHubsRandomOrder", "StudioHubsRandomOrder", false);
        const placeAfter = getCfgValue(cfg, "studioHubsPlaceAfter", "StudioHubsPlaceAfter", "continue watching");
        const placeBefore = getCfgValue(cfg, "studioHubsPlaceBefore", "StudioHubsPlaceBefore", "recently added,latest,recent");

        input("studioHubsHoverVideo").checked = hoverVideo !== false;
        input("studioHubsRandomOrder").checked = randomOrder === true;
        input("studioHubsPlaceAfter").value = String(placeAfter || "continue watching");
        input("studioHubsPlaceBefore").value = String(placeBefore || "recently added,latest,recent");
      }

      async function loadConfig() {
        setStatus("Loading...", null);
        const ts = Date.now();
        const urls = [
          "/Plugins/StudioHubs/config?ts=" + ts,
          "/StudioHubs/config?ts=" + ts
        ];

        let lastError = "unknown";

        for (const url of urls) {
          try {
            const res = await fetch(url, {
              method: "GET",
              cache: "no-store",
              headers: await headers(false)
            });

            if (!res.ok) {
              lastError = "HTTP " + res.status;
              continue;
            }

            const payload = await res.json();
            applyConfig(payload?.config || {});
            setStatus("Loaded.", true);
            return;
          } catch (e) {
            lastError = String(e?.message || e || "request failed");
          }
        }

        const details = (lastError && lastError !== "lastError") ? lastError : "unknown";
        setStatus("Failed to load config (" + details + ").", false);
      }

      async function saveConfig() {
        setStatus("Saving...", null);
        const body = {
          studioHubsHoverVideo: input("studioHubsHoverVideo").checked,
          studioHubsRandomOrder: input("studioHubsRandomOrder").checked,
          studioHubsPlaceAfter: String(input("studioHubsPlaceAfter").value || "").trim(),
          studioHubsPlaceBefore: String(input("studioHubsPlaceBefore").value || "").trim()
        };

        try {
          const res = await fetch("/Plugins/StudioHubs/config", {
            method: "POST",
            cache: "no-store",
            headers: await headers(true),
            body: JSON.stringify(body)
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const payload = await res.json();
          applyConfig(payload?.config || body);
          setStatus("Saved.", true);
        } catch {
          setStatus("Save failed. Admin permission is required.", false);
        }
      }

      saveBtn?.addEventListener("click", saveConfig);

      // Studio Management
      const studiosStatusEl = page.querySelector("#studiosStatus");
      const studiosListEl = page.querySelector("#studiosList");
      const saveStudiosBtn = page.querySelector("#saveStudiosBtn");

      function setStudiosStatus(message, ok) {
        studiosStatusEl.textContent = message || "";
        studiosStatusEl.className = "fieldDescription studiohubs-status" + (ok == null ? "" : ok ? " ok" : " err");
      }

      async function loadStudios() {
        setStudiosStatus("Loading studios...", null);
        const ts = Date.now();
        const urls = [
          "/Plugins/StudioHubs/studio-hubs/studios-manage?ts=" + ts,
          "/StudioHubs/studio-hubs/studios-manage?ts=" + ts
        ];

        let lastError = "unknown";

        for (const url of urls) {
          try {
            const res = await fetch(url, {
              method: "GET",
              cache: "no-store",
              headers: await headers(false)
            });

            if (!res.ok) {
              lastError = "HTTP " + res.status;
              continue;
            }

            const payload = await res.json();
            if (!payload?.ok) {
              lastError = payload?.error || "API error";
              continue;
            }

            const availableStudios = payload?.availableStudios || [];
            const studioOrder = payload?.studioOrder || [];
            const enabledStudios = payload?.enabledStudios || [];

            renderStudiosList(availableStudios, studioOrder, enabledStudios);
            setStudiosStatus("Studios loaded.", true);
            return;
          } catch (e) {
            lastError = String(e?.message || e || "request failed");
          }
        }

        const details = (lastError && lastError !== "lastError") ? lastError : "unknown";
        setStudiosStatus("Failed to load studios (" + details + ").", false);
      }

      function renderStudiosList(availableStudios, studioOrder, enabledStudios) {
        const enabledSet = new Set(enabledStudios);
        const allEnabledByDefault = !Array.isArray(enabledStudios) || enabledStudios.length === 0;

        studiosListEl.innerHTML = "";

        if (!availableStudios || availableStudios.length === 0) {
          studiosListEl.innerHTML = "<p style='text-align: center; color: var(--labelTextColor);'>No studios available.</p>";
          return;
        }

        // Use existing order if set, otherwise use available studios in order
        const orderedStudios = studioOrder && studioOrder.length > 0
          ? studioOrder.filter(s => availableStudios.includes(s)).concat(availableStudios.filter(s => !studioOrder.includes(s)))
          : availableStudios;

        for (let i = 0; i < orderedStudios.length; i++) {
          const studioName = orderedStudios[i];
          const isEnabled = allEnabledByDefault || enabledSet.has(studioName);

          const item = document.createElement("div");
          item.className = "studiohubs-studio-item";
          item.draggable = true;
          item.dataset.index = i;
          item.dataset.studioName = studioName;

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = isEnabled;

          const name = document.createElement("span");
          name.className = "studiohubs-studio-item-name";
          name.textContent = studioName;

          const handle = document.createElement("span");
          handle.className = "studiohubs-studio-item-handle";
          handle.textContent = "⋮⋮";

          item.appendChild(checkbox);
          item.appendChild(name);
          item.appendChild(handle);

          // Drag events
          item.addEventListener("dragstart", (e) => {
            item.classList.add("dragging");
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/html", item.innerHTML);
          });

          item.addEventListener("dragend", () => {
            item.classList.remove("dragging");
          });

          item.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            const afterElement = getDragAfterElement(studiosListEl, e.clientY);
            if (afterElement == null) {
              studiosListEl.appendChild(item);
            } else {
              studiosListEl.insertBefore(item, afterElement);
            }
          });

          studiosListEl.appendChild(item);
        }
      }

      function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll(".studiohubs-studio-item:not(.dragging)")];
        return draggableElements.reduce((closest, child) => {
          const box = child.getBoundingClientRect();
          const offset = y - box.top - box.height / 2;
          if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
          } else {
            return closest;
          }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
      }

      async function saveStudios() {
        setStudiosStatus("Saving...", null);

        const studioOrder = [];
        const enabledStudios = [];

        const items = studiosListEl.querySelectorAll(".studiohubs-studio-item");
        for (const item of items) {
          const studioName = item.dataset.studioName;
          const isEnabled = item.querySelector("input[type='checkbox']").checked;

          studioOrder.push(studioName);
          if (isEnabled) {
            enabledStudios.push(studioName);
          }
        }

        const body = {
          studioOrder,
          enabledStudios
        };

        try {
          const res = await fetch("/Plugins/StudioHubs/studio-hubs/studios-manage", {
            method: "POST",
            cache: "no-store",
            headers: await headers(true),
            body: JSON.stringify(body)
          });

          if (!res.ok) throw new Error("HTTP " + res.status);
          const payload = await res.json();
          if (!payload?.ok) throw new Error(payload?.error || "API error");

          setStudiosStatus("Studios saved.", true);
        } catch {
          setStudiosStatus("Save failed. Admin permission is required.", false);
        }
      }

      saveStudiosBtn?.addEventListener("click", saveStudios);

      loadConfig();
      loadStudios();
    })();
  </script>
</div>
